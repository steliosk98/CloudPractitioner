name: Deploy to GitHub Pages

# Publishes the site by syncing main to the gh-pages branch, which GitHub
# Pages serves from (Settings -> Pages -> Deploy from a branch: gh-pages).
# This avoids the Pages "create site" API, which the workflow token cannot call.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Sync main to gh-pages
        run: git push -f origin main:gh-pages
